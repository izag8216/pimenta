<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06061e"/>
      <stop offset="100%" style="stop-color:#10103a"/>
    </linearGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF4444"/>
      <stop offset="45%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
    <linearGradient id="cg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5555"/>
      <stop offset="100%" style="stop-color:#CC2222"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sg">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" fill="url(#bg)"/>

  <!-- Stars -->
  <g fill="#FFF">
    <circle cx="42" cy="28" r="1" opacity=".4"/><circle cx="98" cy="62" r="1.5" opacity=".3"/>
    <circle cx="156" cy="18" r="1" opacity=".6"/><circle cx="210" cy="85" r="1" opacity=".25"/>
    <circle cx="267" cy="42" r="1.5" opacity=".5"/><circle cx="325" cy="15" r="1" opacity=".35"/>
    <circle cx="388" cy="68" r="1" opacity=".45"/><circle cx="445" cy="32" r="1.5" opacity=".3"/>
    <circle cx="502" cy="78" r="1" opacity=".55"/><circle cx="558" cy="22" r="1.5" opacity=".4"/>
    <circle cx="615" cy="55" r="1" opacity=".35"/><circle cx="672" cy="88" r="1.5" opacity=".5"/>
    <circle cx="730" cy="38" r="1" opacity=".4"/><circle cx="782" cy="72" r="1" opacity=".3"/>
    <circle cx="75" cy="140" r="1" opacity=".5"/><circle cx="180" cy="175" r="1.5" opacity=".3"/>
    <circle cx="340" cy="190" r="1" opacity=".4"/><circle cx="500" cy="160" r="1" opacity=".55"/>
    <circle cx="620" cy="185" r="1.5" opacity=".35"/><circle cx="750" cy="145" r="1" opacity=".45"/>
    <circle cx="30" cy="105" r="1" opacity=".3"/><circle cx="770" cy="195" r="1" opacity=".4"/>
    <circle cx="130" cy="200" r="1" opacity=".5"/><circle cx="400" cy="200" r="1" opacity=".25"/>
    <circle cx="580" cy="130" r="1.5" opacity=".4"/><circle cx="700" cy="115" r="1" opacity=".5"/>
  </g>

  <!-- Left chili pepper -->
  <g transform="translate(140,105) rotate(-15) scale(2)">
    <path d="M0,-16 C7,-14 12,-4 10,6 C8,13 5,16 0,16 C-5,16 -8,13 -10,6 C-12,-4 -7,-14 0,-16Z" fill="url(#cg)" opacity=".6"/>
    <path d="M-1,-16 C1,-22 4,-26 6,-22 C4,-18 1,-16 0,-16Z" fill="#44CC44" opacity=".6"/>
  </g>

  <!-- Right chili pepper -->
  <g transform="translate(660,105) rotate(15) scale(2)">
    <path d="M0,-16 C7,-14 12,-4 10,6 C8,13 5,16 0,16 C-5,16 -8,13 -10,6 C-12,-4 -7,-14 0,-16Z" fill="url(#cg)" opacity=".6"/>
    <path d="M-1,-16 C1,-22 4,-26 6,-22 C4,-18 1,-16 0,-16Z" fill="#44CC44" opacity=".6"/>
  </g>

  <!-- Title -->
  <text x="400" y="112" font-family="monospace" font-size="76" font-weight="bold" fill="url(#tg)" text-anchor="middle" filter="url(#gl)">PIMENTA</text>

  <!-- Subtitle -->
  <text x="400" y="145" font-family="monospace" font-size="15" fill="#9988AA" text-anchor="middle" filter="url(#sg)">A Cute Retro Vertical Scrolling STG</text>

  <!-- Decorative line -->
  <line x1="250" y1="160" x2="550" y2="160" stroke="#FF8C00" stroke-width="1" opacity=".3"/>

  <!-- Small peppers in line -->
  <g transform="translate(255,160) scale(.5)" opacity=".2">
    <path d="M0,-16 C7,-14 12,-4 10,6 C8,13 5,16 0,16 C-5,16 -8,13 -10,6 C-12,-4 -7,-14 0,-16Z" fill="#FF4444"/>
  </g>
  <g transform="translate(545,160) scale(.5)" opacity=".2">
    <path d="M0,-16 C7,-14 12,-4 10,6 C8,13 5,16 0,16 C-5,16 -8,13 -10,6 C-12,-4 -7,-14 0,-16Z" fill="#FF4444"/>
  </g>

  <!-- Bottom tagline -->
  <text x="400" y="195" font-family="monospace" font-size="11" fill="#555577" text-anchor="middle">HTML5 Canvas &bull; Zero Dependencies &bull; Just Open and Play</text>
</svg>
