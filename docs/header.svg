<svg xmlns="http://www.w3.org/2000/svg" width="960" height="240" viewBox="0 0 960 240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060618"/>
      <stop offset="100%" stop-color="#101038"/>
    </linearGradient>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF4444"/>
      <stop offset="40%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF5555"/>
      <stop offset="100%" stop-color="#BB2222"/>
    </linearGradient>
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#55DD55"/>
      <stop offset="100%" stop-color="#228822"/>
    </linearGradient>
    <radialGradient id="gw" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FF4444" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FF4444" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="240" fill="url(#bg)"/>
  <rect width="960" height="240" fill="url(#gw)"/>

  <!-- Subtle grid -->
  <g stroke="#222244" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="40" x2="960" y2="40"/><line x1="0" y1="80" x2="960" y2="80"/>
    <line x1="0" y1="120" x2="960" y2="120"/><line x1="0" y1="160" x2="960" y2="160"/>
    <line x1="0" y1="200" x2="960" y2="200"/>
  </g>

  <!-- Stars -->
  <g fill="#FFFFFF">
    <circle cx="32" cy="22" r="1.2" opacity=".45"/><circle cx="85" cy="55" r="1" opacity=".3"/>
    <circle cx="140" cy="14" r="1.5" opacity=".55"/><circle cx="195" cy="72" r="1" opacity=".25"/>
    <circle cx="250" cy="38" r="1.3" opacity=".5"/><circle cx="310" cy="10" r="1" opacity=".35"/>
    <circle cx="375" cy="60" r="1.2" opacity=".45"/><circle cx="430" cy="28" r="1.5" opacity=".3"/>
    <circle cx="490" cy="68" r="1" opacity=".55"/><circle cx="545" cy="18" r="1.3" opacity=".4"/>
    <circle cx="600" cy="50" r="1" opacity=".35"/><circle cx="660" cy="82" r="1.5" opacity=".5"/>
    <circle cx="720" cy="35" r="1" opacity=".4"/><circle cx="775" cy="65" r="1.2" opacity=".3"/>
    <circle cx="830" cy="42" r="1" opacity=".5"/><circle cx="890" cy="18" r="1.5" opacity=".35"/>
    <circle cx="935" cy="58" r="1" opacity=".45"/>
    <circle cx="60" cy="130" r="1" opacity=".4"/><circle cx="160" cy="168" r="1.3" opacity=".3"/>
    <circle cx="320" cy="185" r="1" opacity=".45"/><circle cx="480" cy="155" r="1.2" opacity=".5"/>
    <circle cx="640" cy="180" r="1" opacity=".35"/><circle cx="790" cy="140" r="1.3" opacity=".4"/>
    <circle cx="900" cy="190" r="1" opacity=".45"/><circle cx="50" cy="95" r="1.2" opacity=".3"/>
    <circle cx="700" cy="108" r="1" opacity=".5"/><circle cx="550" cy="125" r="1.5" opacity=".3"/>
    <circle cx="200" cy="210" r="1" opacity=".4"/><circle cx="750" cy="210" r="1.3" opacity=".35"/>
  </g>

  <!-- Left chili pepper -->
  <g transform="translate(155,112)">
    <g transform="rotate(-20) scale(2.8)">
      <path d="M0,-16 C8,-14 13,-5 11,5 C9,13 5,17 0,17 C-5,17 -9,13 -11,5 C-13,-5 -8,-14 0,-16Z" fill="url(#cg)" opacity=".7"/>
      <path d="M-1,-16 C1,-23 5,-27 7,-23 C5,-19 2,-16 0,-16Z" fill="url(#sg)" opacity=".7"/>
      <path d="M-4,-10 C-2,-12 2,-12 4,-10" fill="none" stroke="#FFFFFF" stroke-width="1.2" opacity=".5"/>
    </g>
  </g>

  <!-- Right chili pepper -->
  <g transform="translate(805,112)">
    <g transform="rotate(20) scale(2.8)">
      <path d="M0,-16 C8,-14 13,-5 11,5 C9,13 5,17 0,17 C-5,17 -9,13 -11,5 C-13,-5 -8,-14 0,-16Z" fill="url(#cg)" opacity=".7"/>
      <path d="M-1,-16 C1,-23 5,-27 7,-23 C5,-19 2,-16 0,-16Z" fill="url(#sg)" opacity=".7"/>
      <path d="M-4,-10 C-2,-12 2,-12 4,-10" fill="none" stroke="#FFFFFF" stroke-width="1.2" opacity=".5"/>
    </g>
  </g>

  <!-- Bullet decorations (player bullets - yellow) -->
  <g fill="#FFD700" opacity=".4">
    <rect x="260" y="85" width="3" height="10" rx="1"/>
    <rect x="268" y="85" width="3" height="10" rx="1"/>
    <rect x="690" y="85" width="3" height="10" rx="1"/>
    <rect x="698" y="85" width="3" height="10" rx="1"/>
  </g>

  <!-- Enemy bullet decorations (cyan) -->
  <g fill="#44DDFF" opacity=".35">
    <circle cx="280" cy="140" r="3"/><circle cx="680" cy="140" r="3"/>
  </g>

  <!-- Title shadow -->
  <text x="480" y="118" font-family="'Courier New',monospace" font-size="82" font-weight="bold" fill="#000000" opacity=".5" text-anchor="middle">PIMENTA</text>

  <!-- Title text (bright outline for depth) -->
  <text x="480" y="116" font-family="'Courier New',monospace" font-size="82" font-weight="bold" fill="none" stroke="#FF2222" stroke-width="1" text-anchor="middle">PIMENTA</text>

  <!-- Title text main -->
  <text x="480" y="116" font-family="'Courier New',monospace" font-size="82" font-weight="bold" fill="url(#tg)" text-anchor="middle">PIMENTA</text>

  <!-- Subtitle -->
  <text x="480" y="152" font-family="'Courier New',monospace" font-size="16" fill="#9988AA" text-anchor="middle">A Cute Retro Vertical Scrolling STG</text>

  <!-- Decorative separator -->
  <line x1="310" y1="168" x2="650" y2="168" stroke="#FF8C00" stroke-width="1" opacity=".25"/>
  <circle cx="310" cy="168" r="2" fill="#FF8C00" opacity=".4"/>
  <circle cx="650" cy="168" r="2" fill="#FF8C00" opacity=".4"/>
  <circle cx="480" cy="168" r="2.5" fill="#FFD700" opacity=".5"/>

  <!-- Bottom tagline -->
  <text x="480" y="200" font-family="'Courier New',monospace" font-size="12" fill="#666688" text-anchor="middle">HTML5 Canvas &#183; Zero Dependencies &#183; Just Open and Play</text>

  <!-- Version badge -->
  <rect x="430" y="212" width="100" height="18" rx="9" fill="#FF4444" opacity=".2"/>
  <text x="480" y="225" font-family="'Courier New',monospace" font-size="10" fill="#FF8866" text-anchor="middle">v1.0.0</text>
</svg>
